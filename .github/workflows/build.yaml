name: MiSTer-Companion

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:

  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: mister-companion
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate ScreenScraper private credentials
        working-directory: mister-companion
        shell: python
        env:
          SCREENSCRAPER: ${{ secrets.SCREENSCRAPER }}
        run: |
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("SCREENSCRAPER", "").strip()
          target = Path("core/screenscraper_private.py")

          dev_id = ""
          dev_password = ""
          softname = "mister-companion"

          if secret:
              data = json.loads(secret)
              dev_id = data.get("dev_id", "")
              dev_password = data.get("dev_password", "")
              softname = data.get("softname", "mister-companion")

              if not dev_id or not dev_password or not softname:
                  raise SystemExit("SCREENSCRAPER secret is missing dev_id, dev_password, or softname")
          else:
              print("SCREENSCRAPER secret not available, building without ScreenScraper developer credentials.")

          target.write_text(
              f'''SS_DEV_ID = {dev_id!r}
          SS_DEV_PASSWORD = {dev_password!r}
          SS_SOFTNAME = {softname!r}


          def has_dev_credentials():
              return bool(SS_DEV_ID and SS_DEV_PASSWORD and SS_SOFTNAME)


          def get_dev_credentials():
              if not has_dev_credentials():
                  return None

              return {{
                  "devid": SS_DEV_ID,
                  "devpassword": SS_DEV_PASSWORD,
                  "softname": SS_SOFTNAME,
              }}
          ''',
              encoding="utf-8",
          )

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          dir
          dir assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --icon app.ico --add-data "assets;assets" --name MiSTer-Companion main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Windows-x86_64
          path: mister-companion/dist/MiSTer-Companion.exe


  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: mister-companion
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate ScreenScraper private credentials
        working-directory: mister-companion
        shell: python
        env:
          SCREENSCRAPER: ${{ secrets.SCREENSCRAPER }}
        run: |
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("SCREENSCRAPER", "").strip()
          target = Path("core/screenscraper_private.py")

          dev_id = ""
          dev_password = ""
          softname = "mister-companion"

          if secret:
              data = json.loads(secret)
              dev_id = data.get("dev_id", "")
              dev_password = data.get("dev_password", "")
              softname = data.get("softname", "mister-companion")

              if not dev_id or not dev_password or not softname:
                  raise SystemExit("SCREENSCRAPER secret is missing dev_id, dev_password, or softname")
          else:
              print("SCREENSCRAPER secret not available, building without ScreenScraper developer credentials.")

          target.write_text(
              f'''SS_DEV_ID = {dev_id!r}
          SS_DEV_PASSWORD = {dev_password!r}
          SS_SOFTNAME = {softname!r}


          def has_dev_credentials():
              return bool(SS_DEV_ID and SS_DEV_PASSWORD and SS_SOFTNAME)


          def get_dev_credentials():
              if not has_dev_credentials():
                  return None

              return {{
                  "devid": SS_DEV_ID,
                  "devpassword": SS_DEV_PASSWORD,
                  "softname": SS_SOFTNAME,
              }}
          ''',
              encoding="utf-8",
          )

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          ls -la
          ls -la assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --add-data "assets:assets" --name MiSTer-Companion main.py

      - name: Make binary executable
        run: chmod +x mister-companion/dist/MiSTer-Companion

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Linux-x86_64
          path: mister-companion/dist/MiSTer-Companion


  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MiSTer-Companion-Windows-x86_64.zip MiSTer-Companion.exe

      - name: Package Linux Build (.tar.gz)
        run: |
          cd dist
          tar -czvf ../MiSTer-Companion-Linux-x86_64.tar.gz MiSTer-Companion

      - name: Update Git Tag
        run: |
          git tag -f Pre-release
          git push -f origin Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          tag: Pre-release
          artifacts: |
            MiSTer-Companion-Windows-x86_64.zip
            MiSTer-Companion-Linux-x86_64.tar.gz