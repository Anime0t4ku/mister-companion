name: MiSTer-Companion

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:

  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: mister-companion
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate ScreenScraper private credentials
        working-directory: mister-companion
        shell: python
        env:
          SCREENSCRAPER: ${{ secrets.SCREENSCRAPER }}
        run: |
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("SCREENSCRAPER", "").strip()
          target = Path("core/screenscraper_private.py")

          dev_id = ""
          dev_password = ""
          softname = "mister-companion"

          if secret:
              data = json.loads(secret)
              dev_id = data.get("dev_id", "")
              dev_password = data.get("dev_password", "")
              softname = data.get("softname", "mister-companion")

              if not dev_id or not dev_password or not softname:
                  raise SystemExit("SCREENSCRAPER secret is missing dev_id, dev_password, or softname")
          else:
              print("SCREENSCRAPER secret not available, building without ScreenScraper developer credentials.")

          target.write_text(
              "\n".join([
                  f"SS_DEV_ID = {dev_id!r}",
                  f"SS_DEV_PASSWORD = {dev_password!r}",
                  f"SS_SOFTNAME = {softname!r}",
                  "",
                  "",
                  "def has_dev_credentials():",
                  "    return bool(SS_DEV_ID and SS_DEV_PASSWORD and SS_SOFTNAME)",
                  "",
                  "",
                  "def get_dev_credentials():",
                  "    if not has_dev_credentials():",
                  "        return None",
                  "",
                  "    return {",
                  "        \"devid\": SS_DEV_ID,",
                  "        \"devpassword\": SS_DEV_PASSWORD,",
                  "        \"softname\": SS_SOFTNAME,",
                  "    }",
                  "",
              ]),
              encoding="utf-8",
          )

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          dir
          dir assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --icon app.ico --add-data "assets;assets" --name MiSTer-Companion main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Windows-x86_64
          path: mister-companion/dist/MiSTer-Companion.exe


  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: mister-companion
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate ScreenScraper private credentials
        working-directory: mister-companion
        shell: python
        env:
          SCREENSCRAPER: ${{ secrets.SCREENSCRAPER }}
        run: |
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("SCREENSCRAPER", "").strip()
          target = Path("core/screenscraper_private.py")

          dev_id = ""
          dev_password = ""
          softname = "mister-companion"

          if secret:
              data = json.loads(secret)
              dev_id = data.get("dev_id", "")
              dev_password = data.get("dev_password", "")
              softname = data.get("softname", "mister-companion")

              if not dev_id or not dev_password or not softname:
                  raise SystemExit("SCREENSCRAPER secret is missing dev_id, dev_password, or softname")
          else:
              print("SCREENSCRAPER secret not available, building without ScreenScraper developer credentials.")

          target.write_text(
              "\n".join([
                  f"SS_DEV_ID = {dev_id!r}",
                  f"SS_DEV_PASSWORD = {dev_password!r}",
                  f"SS_SOFTNAME = {softname!r}",
                  "",
                  "",
                  "def has_dev_credentials():",
                  "    return bool(SS_DEV_ID and SS_DEV_PASSWORD and SS_SOFTNAME)",
                  "",
                  "",
                  "def get_dev_credentials():",
                  "    if not has_dev_credentials():",
                  "        return None",
                  "",
                  "    return {",
                  "        \"devid\": SS_DEV_ID,",
                  "        \"devpassword\": SS_DEV_PASSWORD,",
                  "        \"softname\": SS_SOFTNAME,",
                  "    }",
                  "",
              ]),
              encoding="utf-8",
          )

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          ls -la
          ls -la assets

      - name: Build Executable
        working-directory: mister-companion
        run: pyinstaller --clean --onefile --windowed --add-data "assets:assets" --name MiSTer-Companion main.py

      - name: Make binary executable
        run: chmod +x mister-companion/dist/MiSTer-Companion

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-Linux-x86_64
          path: mister-companion/dist/MiSTer-Companion


  # ============================================================
  # macOS Apple Silicon Build
  # ============================================================
  build-macos-apple-silicon:
    name: Build macOS App Bundle Apple Silicon
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: mister-companion
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate ScreenScraper private credentials
        working-directory: mister-companion
        shell: python
        env:
          SCREENSCRAPER: ${{ secrets.SCREENSCRAPER }}
        run: |
          import json
          import os
          from pathlib import Path

          secret = os.environ.get("SCREENSCRAPER", "").strip()
          target = Path("core/screenscraper_private.py")

          dev_id = ""
          dev_password = ""
          softname = "mister-companion"

          if secret:
              data = json.loads(secret)
              dev_id = data.get("dev_id", "")
              dev_password = data.get("dev_password", "")
              softname = data.get("softname", "mister-companion")

              if not dev_id or not dev_password or not softname:
                  raise SystemExit("SCREENSCRAPER secret is missing dev_id, dev_password, or softname")
          else:
              print("SCREENSCRAPER secret not available, building without ScreenScraper developer credentials.")

          target.write_text(
              "\n".join([
                  f"SS_DEV_ID = {dev_id!r}",
                  f"SS_DEV_PASSWORD = {dev_password!r}",
                  f"SS_SOFTNAME = {softname!r}",
                  "",
                  "",
                  "def has_dev_credentials():",
                  "    return bool(SS_DEV_ID and SS_DEV_PASSWORD and SS_SOFTNAME)",
                  "",
                  "",
                  "def get_dev_credentials():",
                  "    if not has_dev_credentials():",
                  "        return None",
                  "",
                  "    return {",
                  "        \"devid\": SS_DEV_ID,",
                  "        \"devpassword\": SS_DEV_PASSWORD,",
                  "        \"softname\": SS_SOFTNAME,",
                  "    }",
                  "",
              ]),
              encoding="utf-8",
          )

      - name: List Files
        working-directory: mister-companion
        run: |
          pwd
          ls -la
          ls -la assets
          python -c "import platform; print(platform.platform()); print(platform.machine())"

      - name: Create macOS App Icon
        working-directory: mister-companion
        run: |
          mkdir -p build/app_icon.iconset
          sips -z 16 16 assets/icon.png --out build/app_icon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out build/app_icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out build/app_icon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out build/app_icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out build/app_icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out build/app_icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out build/app_icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out build/app_icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out build/app_icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out build/app_icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/app_icon.iconset -o app.icns

      - name: Build App Bundle
        working-directory: mister-companion
        run: pyinstaller --clean --windowed --icon app.icns --add-data "assets:assets" --name MiSTer-Companion main.py

      - name: Import Developer ID Certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/developer_id_application.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH"             -P "$MACOS_CERTIFICATE_PASSWORD"             -A             -t cert             -f pkcs12             -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign App Bundle
        working-directory: mister-companion
        run: |
          codesign --force --deep --options runtime --timestamp             --sign "Developer ID Application: Bjorn Logan (SMNGA44VUR)"             "dist/MiSTer-Companion.app"

          codesign --verify --deep --strict --verbose=2 "dist/MiSTer-Companion.app"

      - name: Create macOS DMG
        working-directory: mister-companion
        run: |
          mkdir -p dmg-root
          cp -R "dist/MiSTer-Companion.app" "dmg-root/"
          ln -s /Applications "dmg-root/Applications"
          hdiutil create -volname "MiSTer Companion" -srcfolder "dmg-root" -ov -format UDZO "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"

      - name: Sign macOS DMG
        working-directory: mister-companion
        run: |
          codesign --force --timestamp             --sign "Developer ID Application: Bjorn Logan (SMNGA44VUR)"             "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"

          codesign --verify --verbose=2 "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"

      - name: Notarize macOS DMG
        working-directory: mister-companion
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"             --apple-id "$APPLE_ID"             --team-id "$APPLE_TEAM_ID"             --password "$APPLE_APP_SPECIFIC_PASSWORD"             --wait

      - name: Staple macOS DMG
        working-directory: mister-companion
        run: |
          xcrun stapler staple "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"
          xcrun stapler validate "dist/MiSTer-Companion-macOS-Apple-Silicon.dmg"

      - name: Upload macOS Apple Silicon Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiSTer-Companion-macOS-Apple-Silicon
          path: mister-companion/dist/MiSTer-Companion-macOS-Apple-Silicon.dmg


  # ============================================================
  # Pre-release Creation
  # ============================================================
  release:
    name: Create / Update Pre-release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos-apple-silicon
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify Downloaded Artifacts
        run: |
          ls -la dist
          test -f dist/MiSTer-Companion.exe
          test -f dist/MiSTer-Companion
          test -f dist/MiSTer-Companion-macOS-Apple-Silicon.dmg

      - name: Zip Windows Build
        run: |
          cd dist
          zip ../MiSTer-Companion-Windows-x86_64.zip MiSTer-Companion.exe

      - name: Package Linux Build (.tar.gz)
        run: |
          cd dist
          tar -czvf ../MiSTer-Companion-Linux-x86_64.tar.gz MiSTer-Companion

      - name: Copy macOS DMG
        run: cp dist/MiSTer-Companion-macOS-Apple-Silicon.dmg ./MiSTer-Companion-macOS-Apple-Silicon.dmg

      - name: Verify Release Packages
        run: |
          test -f MiSTer-Companion-Windows-x86_64.zip
          test -f MiSTer-Companion-Linux-x86_64.tar.gz
          test -f MiSTer-Companion-macOS-Apple-Silicon.dmg
          ls -lh MiSTer-Companion-Windows-x86_64.zip MiSTer-Companion-Linux-x86_64.tar.gz MiSTer-Companion-macOS-Apple-Silicon.dmg

      - name: Update Git Tag
        run: |
          git tag -f Pre-release
          git push -f origin Pre-release

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          tag: Pre-release
          artifacts: |
            MiSTer-Companion-Windows-x86_64.zip
            MiSTer-Companion-Linux-x86_64.tar.gz
            MiSTer-Companion-macOS-Apple-Silicon.dmg
