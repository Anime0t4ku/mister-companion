name: Feature Request
description: Suggest a new feature for MiSTer Companion
title: "[FEATURE] "
labels: ["enhancement"]

body:

- type: markdown
  attributes:
    value: |
      Have an idea to improve MiSTer Companion?

      Describe your feature below.

- type: textarea
  id: feature
  attributes:
    label: Feature Description
    description: What feature would you like to see added?
  validations:
    required: true

- type: textarea
  id: problem
  attributes:
    label: Problem or Motivation
    description: What problem does this feature solve?

- type: textarea
  id: solution
  attributes:
    label: Proposed Solution
    description: How do you imagine this working?

- type: textarea
  id: alternatives
  attributes:
    label: Alternatives Considered
    description: Have you considered other approaches?

- type: textarea
  id: additional
  attributes:
    label: Additional Context
    description: Screenshots, examples, or references.