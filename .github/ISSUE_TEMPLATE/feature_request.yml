name: Feature Request
description: Suggest an improvement for MiSTer Companion
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that could improve MiSTer Companion? Keep the request focused and explain how it would help users.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop
        - Mobile
        - Desktop and Mobile
    validations:
      required: true

  - type: dropdown
    id: desktop_platform
    attributes:
      label: Desktop Operating System
      description: Select Not Applicable when the request is only for Mobile.
      options:
        - Windows
        - Linux
        - Windows and Linux
        - Not Applicable
    validations:
      required: true

  - type: dropdown
    id: mobile_platform
    attributes:
      label: Mobile Operating System
      description: Android is currently the only supported Mobile platform.
      options:
        - Android
        - Not Applicable
    validations:
      required: true

  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: What would you like to be added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why Is This Useful?
      description: What problem would this solve or what would it improve?
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Suggested Behavior
      description: Briefly explain how you imagine the feature working.

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add mockups, screenshots, examples, or relevant links.

  - type: checkboxes
    id: checks
    attributes:
      label: Before Submitting
      options:
        - label: I searched the existing issues and did not find the same request.
          required: true
