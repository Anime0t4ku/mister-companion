name: Mobile Bug Report
description: Report a problem with MiSTer Companion Mobile
title: "[MOBILE BUG] "
labels:
  - bug
  - mobile
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a MiSTer Companion Mobile issue.

        MiSTer Companion Mobile currently supports Android. Please check that you are using the latest release and search existing issues before submitting.

  - type: input
    id: version
    attributes:
      label: MiSTer Companion Mobile Version
      placeholder: e.g. v1.3.6
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating System
      options:
        - Android
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android Version
      placeholder: e.g. Android 16
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model
      placeholder: e.g. Samsung Galaxy S25
    validations:
      required: true

  - type: input
    id: affected_feature
    attributes:
      label: Affected Tab or Feature
      placeholder: e.g. Connection, Remote, RetroAchievements, Extras
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: Explain what happened and include any important context.
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open MiSTer Companion Mobile
        2. Go to ...
        3. Select ...
        4. The problem occurs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Messages
      description: Paste any relevant errors here. Remove private information first.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Add screenshots, videos, or other useful details.

  - type: checkboxes
    id: checks
    attributes:
      label: Before Submitting
      options:
        - label: I am using the latest available version of MiSTer Companion Mobile.
          required: true
        - label: I searched the existing issues and did not find the same problem.
          required: true
