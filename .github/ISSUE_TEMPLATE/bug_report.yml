name: Bug Report
description: Report a problem with MiSTer Companion
title: "[BUG] "
labels: ["bug"]

body:

- type: markdown
  attributes:
    value: |
      Thanks for reporting a bug.

      Please fill out the information below so the issue can be reproduced.

- type: input
  id: version
  attributes:
    label: MiSTer Companion Version
    description: What version of MiSTer Companion are you using?
    placeholder: e.g. v1.1.0
  validations:
    required: true

- type: dropdown
  id: install_type
  attributes:
    label: Installation Type
    description: How are you running MiSTer Companion?
    options:
      - Windows Executable (release build)
      - Python Script (running from source)
  validations:
    required: true

- type: dropdown
  id: os
  attributes:
    label: Operating System
    options:
      - Windows
      - Linux
      - macOS
      - Other
  validations:
    required: true

- type: textarea
  id: description
  attributes:
    label: Describe the Bug
    description: What happened?
    placeholder: Describe the problem clearly.
  validations:
    required: true

- type: textarea
  id: steps
  attributes:
    label: Steps to Reproduce
    description: How can the bug be reproduced?
    placeholder: |
      1. Launch MiSTer Companion
      2. Connect to device
      3. Click ...
      4. Error occurs
  validations:
    required: true

- type: textarea
  id: expected
  attributes:
    label: Expected Behavior
    description: What did you expect to happen?

- type: textarea
  id: logs
  attributes:
    label: Console Output (if applicable)
    description: Paste any console output or errors here.
    render: shell

- type: textarea
  id: additional
  attributes:
    label: Additional Information
    description: Screenshots or extra context.